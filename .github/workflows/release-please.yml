name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Releases created with the default GITHUB_TOKEN don't reliably trigger other
      # workflows (release.yml's `on: release: published`) — a GitHub Actions anti-loop
      # protection. Falls back to GITHUB_TOKEN so this still works before the PAT exists,
      # just without that downstream trigger guarantee.
      # Pinned to an exact version: the floating v4 tag once changed versioning
      # behavior underneath us (1.0.0-alphaNN suddenly became 1.1.0-alphaNN).
      # Renovate proposes upgrades as visible PRs.
      - uses: googleapis/release-please-action@v4.4.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
