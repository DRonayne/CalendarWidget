name: Release APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build for and attach the APK to (e.g. v1.0.0-alpha03). Leave empty to just build + distribute without touching a GitHub release — useful as a manual fallback if the release event didn't auto-trigger this workflow."
        required: false

jobs:
  build-signed-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4

      - name: Restore signing keystore
        if: env.KEYSTORE_B64 != ''
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Restore google-services.json
        if: env.GOOGLE_SERVICES_JSON != ''
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Restore Firebase App Distribution service account
        if: env.FIREBASE_SERVICE_ACCOUNT_B64 != ''
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT_B64" | base64 -d > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Build signed release APK
        env:
          CALENDARWIDGET_STORE_FILE: ${{ runner.temp }}/release.jks
          CALENDARWIDGET_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          CALENDARWIDGET_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          CALENDARWIDGET_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Attach APK to release
        if: github.event_name == 'release' || inputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          cp app/build/outputs/apk/release/app-release.apk "calendar-agenda-widget-${TAG}.apk"
          gh release upload "${TAG}" "calendar-agenda-widget-${TAG}.apk" --clobber

      # Testers are managed as the "release-testers" group in Firebase App Distribution
      # (console/CLI) — never as emails here or anywhere in git history.
      - name: Distribute via Firebase App Distribution
        if: env.FIREBASE_SERVICE_ACCOUNT_B64 != ''
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: ./gradlew :app:appDistributionUploadRelease
