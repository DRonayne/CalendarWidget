name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  light:
    name: light-ci
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Static analysis, assemble, unit tests
        run: ./gradlew spotlessCheck detekt :app:assembleDebug test

  # Runs on every push to main, and on PRs labelled `full-ci`.
  full:
    name: full-ci
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Full build, lint, coverage ratchet, dependency guard
        run: ./gradlew build lint koverVerify dependencyGuard
