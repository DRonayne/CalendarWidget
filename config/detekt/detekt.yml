build:
  maxIssues: 0

style:
  MagicNumber:
    active: false
  MaxLineLength:
    maxLineLength: 120
  ReturnCount:
    max: 3
  UnusedPrivateMember:
    ignoreAnnotated: ['Preview']

naming:
  FunctionNaming:
    ignoreAnnotated: ['Composable']

complexity:
  LongParameterList:
    ignoreAnnotated: ['Composable']
  LongMethod:
    ignoreAnnotated: ['Composable']
  TooManyFunctions:
    ignoreAnnotatedFunctions: ['Composable', 'Preview']
